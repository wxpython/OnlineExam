<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}网上阅卷系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .navbar { background: linear-gradient(135deg, #1a237e, #283593); }
        .navbar-brand, .nav-link { color: #fff !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 8px; }
        .progress { height: 24px; border-radius: 12px; }
        .log-box {
            background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', monospace;
            font-size: 13px; padding: 16px; border-radius: 8px;
            max-height: 400px; overflow-y: auto; white-space: pre-wrap;
            line-height: 1.6;
        }
        .status-badge { font-size: 0.85rem; }
        .status-pending { background: #6c757d; }
        .status-running { background: #0d6efd; }
        .status-completed { background: #198754; }
        .status-failed { background: #dc3545; }
        .status-stopped { background: #fd7e14; }
    </style>
</head>
<body>
    {% if session.get('user_id') %}
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">网上阅卷系统</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link me-3">用户: {{ session.get('username') }}</span>
                <a class="nav-link" href="/logout">退出</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% if flash_messages %}
        {% for category, message in flash_messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
